services:
  # Main 서비스
  service-docker-main:
    image: exodusean/nginx:1.29.7-docker-main
    container_name: docker-main-nginx-container
    restart: always
    ports:
      - "8080:80"
    networks:
      - board-network

  # Sub 서비스 (이름과 포트를 변경)
  service-docker-sub:
    image: exodusean/nginx:1.29.7-docker-sub
    container_name: docker-sub-nginx-container
    restart: always
    ports:
      - "8081:80"
    networks:
      - board-network

networks:
  board-network:
    driver: bridge