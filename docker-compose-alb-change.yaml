services:
  # Main 서비스
  service-docker-main:
    image: exodusean/nginx:1.29.7-docker-main
    container_name: docker-main-nginx-container
    restart: always
    ports:
      - "8080:80"
    networks:
      - board-network

  # Sub 서비스 (이름과 포트를 변경)
  service-docker-sub:
    image: exodusean/nginx:1.29.7-docker-sub
    container_name: docker-sub-nginx-container
    restart: always
    ports:
      - "8081:80"
    networks:
      - board-network

  # FastAPI 서비스
  service-fastapi:
    image: exodusean/fastapi:1.0.0-api
    container_name: fastapi-container
    restart: always
    ports:
      - "8000:8000"
    networks:
      - board-network

  # Install 서비스
  service-install:
    image: exodusean/nginx:1.0.0-install
    container_name: install-nginx-container
    restart: always
    ports:
      - "8082:80"
    networks:
      - board-network

networks:
  board-network:
    driver: bridge