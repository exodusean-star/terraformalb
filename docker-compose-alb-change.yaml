services:
  # main 서비스 (Nginx)
  service-docker-main:
    image: exodusean/nginx:1.29.7-docker-main
    container_name: docker-main-nginx-container
    restart: always
    ports:
      - "8080:80"
    networks:
      - board-network

networks:
  board-network:
    driver: bridge


services:
